<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stylish Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playwrite+AU+SA:wght@100..400&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="menu">
      <div>
        <img
          class="logo"
          alt="Joice Ortega"
          src="https://s3.amazonaws.com/shecodesio-production/uploads/files/000/167/631/original/J-O_Image_May_21__2025__07_59_45_PM.png?1749468240"
        />
      </div>
      <div>
        <button id="menu-button">
          <span class="material-symbols-outlined button"> menu </span>
          <ul class="dropdown-menu">
            <li><a class="menu about-me" href="#info">About me</a></li>
            <li>
              <a class="menu photo-gallery" href="gindex.html" target="_blank"
                >Gallery</a
              >
            </li>
          </ul>
        </button>
      </div>
    </div>
    <div class="container">
      <!-- Searching input section -->
      <header>
        <form id="search-form">
          <input
            type="search"
            name="add-city"
            id="add-city"
            placeholder="Enter city name"
            required
          />
          <button type="submit" value="search">Search</button>
        </form>
        <hr />
      </header>
      <!--Display section-->
      <main>
        <div class="current-weather">
          <h1 id="city">Type a place..</h1>
          <p class="current-date">
            <strong><span class="today"></span></strong>, <span
              class="condition-description"
            >
            </span>
            <br />
            Humidity: <strong><span class="humidity">%</span></strong
            >, Wind: <strong><span class="wind">m/s</span></strong>
          </p>
          <p class="temperature-now">
            <span class="material-symbols-outlined main"> sunny </span
            ><span class="current-temperature"> °C</span>
          </p>
        </div>
        <!-- Forecast Section-->

        <div id="forecast"></div>
      </main>
      <hr />
      <!--Project info section-->
      <footer>
        <p class="coded-by">
          This project was coded by
          <a
            class="foot-link"
            href="https://github.com/Pampinup"
            target="_blank"
            >Joice Ortega</a
          >
          and is on
          <a
            class="foot-link"
            href="https://github.com/Pampinup/Weather-App-Project"
            target="_blank"
          >
            GitHub</a
          >
          and hosted on
          <a
            class="foot-link"
            href="https://dapper-gumdrop-ea35d0.netlify.app/"
            target="_blank"
          >
            Netlify</a
          >
        </p>
      </footer>
    </div>
    <script src="src/script.js"></script>
  </body>
</html>
